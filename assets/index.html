<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carol — Agente de Viagens</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ==================== WELCOME ==================== -->
  <div id="screen-welcome" class="screen active">

    <!-- Language switcher -->
    <div class="lang-switcher">
      <button id="lang-pt" class="lang-btn active-lang" onclick="setLanguage('pt')">🇧🇷 PT</button>
      <button id="lang-en" class="lang-btn" onclick="setLanguage('en')">🇺🇸 EN</button>
    </div>

    <!-- Floating decorative icons -->
    <div class="floaties" aria-hidden="true">
      <span style="--x:8%;  --y:12%; --s:1.6; --d:0s">✈️</span>
      <span style="--x:88%; --y:8%;  --s:1.2; --d:.8s">🗺️</span>
      <span style="--x:5%;  --y:70%; --s:1.0; --d:1.4s">🏝️</span>
      <span style="--x:92%; --y:65%; --s:1.3; --d:.4s">🗼</span>
      <span style="--x:50%; --y:5%;  --s:0.9; --d:1.1s">🌍</span>
      <span style="--x:20%; --y:88%; --s:1.1; --d:.2s">🧳</span>
      <span style="--x:78%; --y:90%; --s:0.9; --d:1.7s">📸</span>
      <span style="--x:40%; --y:93%; --s:1.0; --d:.6s">🍜</span>
    </div>

    <div class="welcome-inner">

      <!-- Hero -->
      <div class="hero">
        <div class="avatar-wrap">
          <img src="assets/carol-avatar.jpeg" alt="Carol" class="avatar-img" id="avatar-img"
               onerror="this.style.display='none';document.getElementById('avatar-fallback').style.display='flex'" />
          <div id="avatar-fallback" class="avatar-fallback">🌍</div>
        </div>
        <div class="hero-text">
          <h1 id="hero-title">Oi, eu sou a <span class="name-highlight">Carol!</span></h1>
          <p id="hero-sub" class="hero-sub">Sua consultora de viagens pessoal, roteiros reais de quem viajou de verdade, ou planejamento sob medida para qualquer destino do mundo.</p>
        </div>
      </div>

      <!-- Cards -->
      <div class="mode-cards">
        <button class="mode-card card-assinado" onclick="selectMode('assinatura')">
          <div class="card-badge" id="badge-real">Experiência real</div>
          <span class="card-icon">✈️</span>
          <h2 id="card-assinado-title">Roteiros Assinados</h2>
          <p id="card-assinado-desc">Destinos que eu viajei de verdade: hotéis, restaurantes, dicas que nenhum blog genérico vai te dar.</p>
          <span class="card-cta" id="card-assinado-cta">Ver meus destinos →</span>
        </button>

        <button class="mode-card card-livre" onclick="selectMode('livre')">
          <div class="card-badge" id="badge-ia">IA + pesquisa</div>
          <span class="card-icon">🗺️</span>
          <h2 id="card-livre-title">Roteiro Livre</h2>
          <p id="card-livre-desc">Qualquer destino do mundo: te monto um roteiro completo com hospedagem, comida, dicas práticas e custos.</p>
          <span class="card-cta" id="card-livre-cta">Planejar viagem →</span>
        </button>
      </div>

      <p class="powered-by" id="powered-by">Powered by Starseek</p>
    </div>
  </div>

  <!-- ==================== LISTA DE ROTEIROS ==================== -->
  <div id="screen-roteiros" class="screen">
    <header class="top-bar">
      <button class="btn-back" onclick="goBack()">← Voltar</button>
      <div class="top-bar-title">
        <span>✈️</span>
        <h2 id="signed-routes-title">Roteiros Assinados</h2>
      </div>
      <div style="width:70px"></div>
    </header>
    <div id="roteiro-grid" class="roteiro-grid"></div>
  </div>

  <!-- ==================== CHAT ==================== -->
  <div id="screen-chat" class="screen">
    <header class="top-bar">
      <button class="btn-back" onclick="goBack()">← Voltar</button>
      <div class="chat-title">
        <img src="assets/carol-avatar.jpeg" class="chat-avatar" alt="Carol" />
        <div>
          <div class="chat-name">Carol</div>
          <div id="chat-title-text" class="chat-subtitle">
            <span id="chat-subtitle-default">Agente de Viagens</span>
          </div>
        </div>
      </div>
      <button class="btn-clear" id="btn-clear" onclick="clearChat()" title="Nova conversa">↺</button>
    </header>

    <div id="messages" class="messages"></div>

    <div class="input-bar">
      <textarea
        id="user-input"
        placeholder="Pergunte algo para a Carol..."
        rows="1"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
      ></textarea>
      <button id="btn-send" onclick="handleSend()">➤</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
